name: Trigger Sync

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
      MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
      MAX_CHANNEL_ID: ${{ vars.MAX_CHANNEL_ID }}

    steps:
      #- uses: oven-sh/setup-bun@v2
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install LLM
        run: pip install llm

      - name: Configure LLM
        run: |
          mkdir -p ~/.config/io.datasette.llm
          cat <<EOF > ~/.config/io.datasette.llm/extra-openai-models.yaml
          - model_id: litellm
            model_name: ${{ vars.OPENAI_MODEL }}
            api_base: "${{ vars.OPENAI_API_BASE }}"
            api_key_name: litellm
          EOF
          
          cat <<EOF > ~/.config/io.datasette.llm/keys.json
          {
            "// Note": "This file stores secret API credentials. Do not share!",
            "litellm": "${{ secrets.OPENAI_API_KEY }}"
          }
          EOF

      - name: Clean AI symbols in changed files
        run: |
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD~1"
          fi

          printf '%s\n' \
            's/•/-/g' \
            's/—/-/g' \
            's/–/-/g' \
            's/[""]/"/g' \
            "s/['']/'/g" \
            's/[«»]/"/g' \
            's/…/.../g' \
            's/×/x/g' \
            's/°/o/g' \
            's/[[:space:]]+/ /g' \
            's/^[[:space:]]+//g' \
            's/[[:space:]]+$//g' \
            > /tmp/clean_ai.sed

          CHANGED_CONTENT_FILES=$(git diff --name-only $BEFORE_SHA ${{ github.sha }} | grep '^content/' || true)

          if [ -z "$CHANGED_CONTENT_FILES" ]; then
            echo "No changes in content/ found."
            exit 0
          fi

          for FILE in $CHANGED_CONTENT_FILES; do
            if [ -f "$FILE" ]; then
              echo "Cleaning AI symbols in $FILE..."
              sed -i -E -f /tmp/clean_ai.sed "$FILE"
            fi
          done

      - name: Translate Changed Russian Files
        run: |
          # Get list of changed files in content/ru
          # When triggered by push, github.event.before is the previous commit.
          # If it's the first push of a branch, github.event.before might be zeros.
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD~1"
          fi
          
          CHANGED_FILES=$(git diff --name-only $BEFORE_SHA ${{ github.sha }} | grep '^content/ru/' || true)
          CHANGED_EN_FILES=$(git diff --name-only $BEFORE_SHA ${{ github.sha }} | grep '^content/en/' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes in content/ru/ found."
            exit 0
          fi

          for FILE in $CHANGED_FILES; do
            if [ -f "$FILE" ]; then
              EN_FILE=${FILE/content\/ru\//content\/en\/}

              if echo "$CHANGED_EN_FILES" | grep -qFx "$EN_FILE"; then
                echo "Skipping $FILE — English version already provided in this commit."
                continue
              fi

              EN_DIR=$(dirname "$EN_FILE")
              mkdir -p "$EN_DIR"
              
              echo "Translating $FILE to $EN_FILE..."
              
              PROMPT="Translate the following markdown file from Russian to English. Maintain all markdown formatting, frontmatter, and technical terms. Provide the translation in a markdown code block. Important: in the YAML frontmatter, use double quotes (not single quotes) for all string values such as title and description, so that apostrophes in the text do not break the YAML syntax."
              
              llm -m litellm --system "$PROMPT" -f "$FILE" -x > "$EN_FILE"
              
              echo "Cleaning AI symbols in $EN_FILE..."
              sed -i -E -f /tmp/clean_ai.sed "$EN_FILE"
            fi
          done

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add content/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-translate content" && git push)
 
      - name: Trigger Content Sync
        if: ${{ vars.SYNC_URL }}
        run: |
          curl --fail --show-error -X POST "${{ vars.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Prepare Announcement
        id: announce
        run: |
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD~1"
          fi

          # Take the first new Russian blog post from the commit (one commit = one article)
          FILE=$(git diff --name-only --diff-filter=A $BEFORE_SHA ${{ github.sha }} | grep '^content/ru/blog/' | head -1 || true)

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No new posts in content/ru/blog/ found, skipping announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SITE_BASE_URL="${{ vars.SITE_BASE_URL || 'https://iconicompany.com' }}"
          SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
          POST_URL="${SITE_BASE_URL}/ru/blog/${SLUG}"

          EXCERPT=$(python3 - "$FILE" << 'PYEOF'
import sys, re

with open(sys.argv[1]) as f:
    content = f.read()

# Strip frontmatter
if content.startswith('---'):
    end = content.find('---', 3)
    if end != -1:
        content = content[end+3:].lstrip('\n')

# Split into paragraphs (blocks separated by blank lines)
paragraphs = re.split(r'\n\s*\n', content)

# Collect up to 2 text paragraphs (skip header-only blocks)
text_paragraphs = []
for p in paragraphs:
    p = p.strip()
    if not p:
        continue
    lines = [l for l in p.split('\n') if l.strip()]
    if all(re.match(r'^#+\s*', l) for l in lines):
        continue
    text_paragraphs.append(p)
    if len(text_paragraphs) >= 2:
        break

excerpt = '\n\n'.join(text_paragraphs)

# Strip basic markdown formatting
excerpt = re.sub(r'^#+\s*', '', excerpt, flags=re.MULTILINE)
excerpt = re.sub(r'\*\*(.+?)\*\*', r'\1', excerpt)
excerpt = re.sub(r'\*(.+?)\*', r'\1', excerpt)
excerpt = re.sub(r'`(.+?)`', r'\1', excerpt)
excerpt = re.sub(r'\[(.+?)\]\(.+?\)', r'\1', excerpt)

print(excerpt)
PYEOF
          )

          printf '%s\n\nПодробнее: %s\n' "$EXCERPT" "$POST_URL" > "$RUNNER_TEMP/announcement.txt"
          echo "has_post=true" >> "$GITHUB_OUTPUT"

      - name: Announce to Telegram
        if: ${{ steps.announce.outputs.has_post == 'true' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHANNEL_ID != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement.txt")
          curl --fail --show-error -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "${TELEGRAM_CHANNEL_ID}" --arg text "$MESSAGE" '{chat_id: $chat_id, text: $text, disable_web_page_preview: false}')"

      - name: Announce to Max
        if: ${{ steps.announce.outputs.has_post == 'true' && env.MAX_BOT_TOKEN != '' && env.MAX_CHANNEL_ID != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement.txt")
          curl --fail --show-error -s -X POST "https://botapi.max.ru/messages?access_token=${MAX_BOT_TOKEN}&chat_id=${MAX_CHANNEL_ID}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{text: $text}')"
