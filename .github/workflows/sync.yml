name: Trigger Sync

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
      MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
      MAX_CHANNEL_ID: ${{ vars.MAX_CHANNEL_ID }}
      LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
      LINKEDIN_AUTHOR: ${{ vars.LINKEDIN_AUTHOR }}
      MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
      MEDIUM_AUTHOR_ID: ${{ vars.MEDIUM_AUTHOR_ID }}
      THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
      THREADS_USER_ID: ${{ vars.THREADS_USER_ID }}
      THREADS_LANG: ${{ vars.THREADS_LANG || 'en' }}
      TELEGRAM_ENGLISH_CHANNEL_ID: ${{ vars.TELEGRAM_ENGLISH_CHANNEL_ID }}
      X_TOKEN: ${{ secrets.X_TOKEN }}
      X_USER_ID: ${{ vars.X_USER_ID }}

    steps:
      #- uses: oven-sh/setup-bun@v2
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install LLM
        run: pip install llm

      - name: Configure LLM
        run: |
          mkdir -p ~/.config/io.datasette.llm
          cat <<EOF > ~/.config/io.datasette.llm/extra-openai-models.yaml
          - model_id: litellm
            model_name: ${{ vars.OPENAI_MODEL }}
            api_base: "${{ vars.OPENAI_API_BASE }}"
            api_key_name: litellm
          EOF
          
          cat <<EOF > ~/.config/io.datasette.llm/keys.json
          {
            "// Note": "This file stores secret API credentials. Do not share!",
            "litellm": "${{ secrets.OPENAI_API_KEY }}"
          }
          EOF

      - name: Identify new post
        id: files
        run: |
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD~1"
          fi

          FILE=$(git diff --name-only --diff-filter=A "$BEFORE_SHA" ${{ github.sha }} | grep '^content/ru/blog/' | head -1 || true)
          echo "new_post=$FILE" >> "$GITHUB_OUTPUT"
          echo "New post: $FILE"

      - name: Update date in new post
        if: ${{ steps.files.outputs.new_post != '' }}
        run: |
          FILE="${{ steps.files.outputs.new_post }}"
          TODAY=$(date -u +%Y-%m-%d)
          echo "Updating date in $FILE to $TODAY..."
          sed -i -E "s/^(date:[[:space:]]*)(['\"]?)[0-9]{4}-[0-9]{2}-[0-9]{2}(['\"]?)/\1\2$TODAY\3/" "$FILE"

      - name: Clean AI symbols in new post
        if: ${{ steps.files.outputs.new_post != '' }}
        run: |
          FILE="${{ steps.files.outputs.new_post }}"
          printf '%s\n' \
            's/•/-/g' \
            's/—/-/g' \
            's/–/-/g' \
            's/[""]/"/g' \
            "s/['']/'/g" \
            's/…/.../g' \
            's/×/x/g' \
            's/°/o/g' \
            's/[[:space:]]+/ /g' \
            's/^[[:space:]]+//g' \
            's/[[:space:]]+$//g' \
            > /tmp/clean_ai.sed
          echo "Cleaning AI symbols in $FILE..."
          sed -i -E -f /tmp/clean_ai.sed "$FILE"

      - name: Translate new post to English
        if: ${{ steps.files.outputs.new_post != '' }}
        run: |
          FILE="${{ steps.files.outputs.new_post }}"
          EN_FILE="${FILE/content\/ru\//content\/en\/}"
          EN_DIR=$(dirname "$EN_FILE")
          mkdir -p "$EN_DIR"

          PROMPT="Translate the following markdown file from Russian to English. Maintain all markdown formatting, frontmatter, and technical terms. Provide the translation in a markdown code block. Important: in the YAML frontmatter, use double quotes (not single quotes) for all string values such as title and description, so that apostrophes in the text do not break the YAML syntax."

          echo "Translating $FILE to $EN_FILE..."
          llm -m litellm --system "$PROMPT" -f "$FILE" -x > "$EN_FILE"

          echo "Cleaning AI symbols in $EN_FILE..."
          sed -i -E -f /tmp/clean_ai.sed "$EN_FILE"

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add content/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-translate content" && git push)
 
      - name: Trigger Content Sync
        if: ${{ vars.SYNC_URL }}
        run: |
          curl --fail --show-error -X POST "${{ vars.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Prepare Announcement
        id: announce
        run: |
          FILE="${{ steps.files.outputs.new_post }}"

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No new posts in content/ru/blog/ found, skipping announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SITE_BASE_URL="${{ vars.SITE_BASE_URL || 'https://iconicompany.com' }}"
          SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
          POST_URL="${SITE_BASE_URL}/ru/blog/${SLUG}"

          PROMPT="Напиши вирусный пост по мотивам этой статьи. Структура: 1) Мощный крючок — первая строка, которая цепляет и заставляет нажать 'ещё' (провокационный вопрос, неожиданный факт или смелое утверждение). 2) История или инсайт из 3-5 коротких абзацев (каждый абзац — 1-2 предложения, пустая строка между абзацами). 3) Главный вывод или призыв к действию. 4) 3-5 релевантных хэштегов. Пиши живым разговорным языком, избегай корпоративных клише. Не используй markdown-разметку: никаких **, *, _, #. Добавь 2-4 эмодзи по смыслу. Не добавляй ссылку — она будет добавлена автоматически. Отвечай только текстом поста, без пояснений и кавычек."

          ANNOUNCEMENT=$(llm -m litellm --system "$PROMPT" -f "$FILE" -x) || { echo "Failed to generate announcement for $FILE."; exit 1; }

          # Strip any remaining markdown formatting and AI-style symbols just in case
          ANNOUNCEMENT=$(printf '%s' "$ANNOUNCEMENT" | sed -E \
            -e 's/\*\*//g' \
            -e 's/\*//g' \
            -e 's/__//g' \
            -e 's/^[[:space:]]*#+[[:space:]]*//' \
            -e 's/^[[:space:]]*-[[:space:]]*/- /g' \
            -e 's/•/-/g' \
            -e 's/—/-/g' \
            -e 's/–/-/g' \
            -e 's/[“”]/"/g' \
            -e "s/[‘’]/'/g" \
            -e 's/…/.../g' \
            -e 's/×/x/g' \
            -e 's/°/o/g')

          printf '%s\n\n%s\n\n👉 https://t.me/iconicompany\n' "$ANNOUNCEMENT" "$POST_URL" > "$RUNNER_TEMP/announcement_ru.txt"

          TITLE=$(grep -m1 '^title:' "$FILE" | sed 's/^title:[[:space:]]*//' | tr -d '"'"'" || true)
          echo "has_post=true" >> "$GITHUB_OUTPUT"
          echo "post_title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "post_url=$POST_URL" >> "$GITHUB_OUTPUT"

      - name: Prepare English Announcement
        id: announce_en
        run: |
          FILE="${{ steps.files.outputs.new_post }}"

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No new posts found, skipping English announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EN_FILE="${FILE/content\/ru\//content\/en\/}"

          if [ ! -f "$EN_FILE" ]; then
            echo "English translation not found at $EN_FILE, skipping English announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SITE_BASE_URL="${{ vars.SITE_BASE_URL || 'https://iconicompany.com' }}"
          SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
          EN_POST_URL="${SITE_BASE_URL}/en/blog/${SLUG}"

          PROMPT="Write a viral post based on this article. Keep the entire post strictly under 500 characters (including spaces, emojis, and hashtags) - this is a hard limit for Threads and X. Structure: 1) A powerful hook - the first line that grabs attention. 2) 1-2 sentences of key insight. 3) One clear takeaway or call to action. 4) 2-3 relevant hashtags. Write in a lively conversational style, avoid corporate clichés. Do not use markdown formatting: no **, *, _, #. Add 1-2 relevant emojis. Do not add a URL - it will be appended automatically. Reply with only the post text, no explanations or quotes."

          ANNOUNCEMENT=$(llm -m litellm --system "$PROMPT" -f "$EN_FILE" -x) || { echo "Failed to generate English announcement."; exit 1; }

          ANNOUNCEMENT=$(printf '%s' "$ANNOUNCEMENT" | sed -E \
            -e 's/\*\*//g' \
            -e 's/\*//g' \
            -e 's/__//g' \
            -e 's/^[[:space:]]*#+[[:space:]]*//' \
            -e 's/^[[:space:]]*-[[:space:]]*/- /g' \
            -e 's/•/-/g' \
            -e 's/—/-/g' \
            -e 's/–/-/g' \
            -e 's/[""]/"/g' \
            -e "s/['']/'/g" \
            -e 's/…/.../g' \
            -e 's/×/x/g' \
            -e 's/°/o/g')

          printf '%s\n\n%s\n' "$ANNOUNCEMENT" "$EN_POST_URL" > "$RUNNER_TEMP/announcement_en.txt"

          echo "has_post=true" >> "$GITHUB_OUTPUT"
          echo "post_url=$EN_POST_URL" >> "$GITHUB_OUTPUT"

      - name: Announce to Telegram
        if: ${{ steps.announce.outputs.has_post == 'true' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHANNEL_ID != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement_ru.txt")
          jq -n --arg chat_id "${TELEGRAM_CHANNEL_ID}" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, disable_web_page_preview: false}' \
            > "$RUNNER_TEMP/telegram_payload.json"
          curl --fail --show-error -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "@$RUNNER_TEMP/telegram_payload.json"

      - name: Announce English Post to Telegram
        if: ${{ steps.announce_en.outputs.has_post == 'true' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_ENGLISH_CHANNEL_ID != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement_en.txt")
          jq -n --arg chat_id "${TELEGRAM_ENGLISH_CHANNEL_ID}" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, disable_web_page_preview: false}' \
            > "$RUNNER_TEMP/telegram_en_payload.json"
          curl --fail --show-error -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "@$RUNNER_TEMP/telegram_en_payload.json"

      - name: Announce to Threads
        if: ${{ (steps.announce.outputs.has_post == 'true' || steps.announce_en.outputs.has_post == 'true') && env.THREADS_TOKEN != '' && env.THREADS_USER_ID != '' }}
        run: |
          if [ "${THREADS_LANG}" = "ru" ]; then
            MESSAGE=$(cat "$RUNNER_TEMP/announcement_ru.txt")
          else
            MESSAGE=$(cat "$RUNNER_TEMP/announcement_en.txt")
          fi
          CREATION_ID=$(curl --fail --show-error -s \
            -X POST "https://graph.threads.net/v1.0/${THREADS_USER_ID}/threads" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{media_type: "TEXT", text: $text}')" \
            -H "Authorization: Bearer ${THREADS_TOKEN}" \
            | jq -r '.id')
          curl --fail --show-error -s \
            -X POST "https://graph.threads.net/v1.0/${THREADS_USER_ID}/threads_publish" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg id "$CREATION_ID" '{creation_id: $id}')" \
            -H "Authorization: Bearer ${THREADS_TOKEN}"

      - name: Announce English Post to X
        if: ${{ steps.announce_en.outputs.has_post == 'true' && env.X_TOKEN != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement_en.txt")
          curl --fail --show-error -s \
            -X POST "https://api.twitter.com/2/tweets" \
            -H "Authorization: Bearer ${X_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{text: $text}')"

      - name: Announce to Max
        if: ${{ steps.announce.outputs.has_post == 'true' && env.MAX_BOT_TOKEN != '' && env.MAX_CHANNEL_ID != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement_ru.txt")
          jq -n --arg text "$MESSAGE" '{text: $text}' \
            > "$RUNNER_TEMP/max_payload.json"
          curl --fail --show-error -s -X POST "https://botapi.max.ru/messages?access_token=${MAX_BOT_TOKEN}&chat_id=${MAX_CHANNEL_ID}" \
            -H "Content-Type: application/json" \
            --data "@$RUNNER_TEMP/max_payload.json"

      - name: Announce to LinkedIn
        if: ${{ steps.announce.outputs.has_post == 'true' && env.LINKEDIN_TOKEN != '' && env.LINKEDIN_AUTHOR != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement_ru.txt")
          jq -n --arg author "${LINKEDIN_AUTHOR}" --arg text "$MESSAGE" '{
            author: $author,
            lifecycleState: "PUBLISHED",
            specificContent: {
              "com.linkedin.ugc.ShareContent": {
                shareCommentary: { text: $text },
                shareMediaCategory: "NONE"
              }
            },
            visibility: {
              "com.linkedin.ugc.MemberNetworkVisibility": "PUBLIC"
            }
          }' > "$RUNNER_TEMP/linkedin_payload.json"
          cat "$RUNNER_TEMP/linkedin_payload.json"
          curl --fail --show-error -s -X POST "https://api.linkedin.com/v2/ugcPosts" \
            -H "Authorization: Bearer ${LINKEDIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-Restli-Protocol-Version: 2.0.0" \
            --data "@$RUNNER_TEMP/linkedin_payload.json"

      - name: Announce to Medium
        if: ${{ steps.announce.outputs.has_post == 'true' && env.MEDIUM_TOKEN != '' && env.MEDIUM_AUTHOR_ID != '' }}
        run: |
          MESSAGE=$(cat "$RUNNER_TEMP/announcement_ru.txt")
          jq -n \
            --arg title "${{ steps.announce.outputs.post_title }}" \
            --arg content "$MESSAGE" \
            --arg canonical "${{ steps.announce.outputs.post_url }}" \
            '{
              title: $title,
              contentFormat: "markdown",
              content: $content,
              canonicalUrl: $canonical,
              publishStatus: "public"
            }' > "$RUNNER_TEMP/medium_payload.json"
          curl --fail --show-error -s \
            -X POST "https://api.medium.com/v1/users/${MEDIUM_AUTHOR_ID}/posts" \
            -H "Authorization: Bearer ${MEDIUM_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "@$RUNNER_TEMP/medium_payload.json"

