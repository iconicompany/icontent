name: Trigger Sync

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
      MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
      MAX_CHANNEL_ID: ${{ vars.MAX_CHANNEL_ID }}
      LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
      LINKEDIN_AUTHOR: ${{ vars.LINKEDIN_AUTHOR }}
      MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
      MEDIUM_AUTHOR_ID: ${{ vars.MEDIUM_AUTHOR_ID }}
      THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
      THREADS_USER_ID: ${{ vars.THREADS_USER_ID }}
      THREADS_LANG: ${{ vars.THREADS_LANG || 'en' }}
      TELEGRAM_ENGLISH_CHANNEL_ID: ${{ vars.TELEGRAM_ENGLISH_CHANNEL_ID }}
      X_TOKEN: ${{ secrets.X_TOKEN }}
      X_USER_ID: ${{ vars.X_USER_ID }}
      TELEGRAM_CHANNEL_URL: ${{ vars.TELEGRAM_CHANNEL_URL }}
      MAX_CHANNEL_URL: ${{ vars.MAX_CHANNEL_URL }}
      DZEN_CHANNEL_URL: ${{ vars.DZEN_CHANNEL_URL }}
      TELEGRAPH_ACCESS_TOKEN: ${{ secrets.TELEGRAPH_ACCESS_TOKEN }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://iconicompany.com' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install LLM
        run: pip install llm "markdown==3.7" requests
      - name: Configure LLM
        run: |
          mkdir -p ~/.config/io.datasette.llm
          cat <<EOF > ~/.config/io.datasette.llm/extra-openai-models.yaml
          - model_id: default
            model_name: ${{ vars.OPENAI_MODEL }}
            api_base: "${{ vars.OPENAI_API_BASE }}"
            api_key_name: litellm
          EOF
          
          cat <<EOF > ~/.config/io.datasette.llm/keys.json
          {
            "// Note": "This file stores secret API credentials. Do not share!",
            "litellm": "${{ secrets.OPENAI_API_KEY }}"
          }
          EOF

      - name: Identify new post
        id: files
        run: |
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD~1"
          fi

          FILE=$(git diff --name-only --diff-filter=A "$BEFORE_SHA" ${{ github.sha }} | grep -E '^content/ru/blog/.*\.(md|mdx)$' | head -1 || true)
          echo "new_post=$FILE" >> "$GITHUB_OUTPUT"
          echo "New post: $FILE"

          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            EXCLUDE=$(grep -m1 '^exclude:' "$FILE" | sed 's/^exclude:[[:space:]]*//' | tr -d "'\"" || true)
            echo "exclude=$EXCLUDE" >> "$GITHUB_OUTPUT"

            if head -n 1 "$FILE" | grep -q '^---$'; then
               echo "has_frontmatter=true" >> "$GITHUB_OUTPUT"
            else
               echo "has_frontmatter=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Finalize and format post
        id: finalize
        if: ${{ steps.files.outputs.new_post != '' && steps.files.outputs.has_frontmatter == 'false' }}
        run: |
          FILE="${{ steps.files.outputs.new_post }}"
          echo "Finalizing $FILE..."
          
          # Run add-post.sh. It will handle frontmatter, read also, image, and renaming if needed.
          OUTPUT=$(bash scripts/add-post.sh "$FILE")
          echo "$OUTPUT"
          
          # Extract the final filename from the last line (using grep and awk)
          FINAL_FILE=$(echo "$OUTPUT" | grep "Done! Post created at" | awk '{print $NF}')
          
          if [ -n "$FINAL_FILE" ] && [ -f "$FINAL_FILE" ]; then
             echo "Final file path: $FINAL_FILE"
             echo "new_post=$FINAL_FILE" >> "$GITHUB_OUTPUT"
          else
             echo "Failed to determine final file path. Using original $FILE."
             echo "new_post=$FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Update date in finalized post
        if: ${{ steps.finalize.outputs.new_post != '' || (steps.files.outputs.new_post != '' && steps.files.outputs.has_frontmatter == 'true') }}
        run: |
          FILE="${{ steps.finalize.outputs.new_post || steps.files.outputs.new_post }}"
          TODAY=$(date -u +%Y-%m-%d)
          echo "Updating date in $FILE to $TODAY..."
          sed -i -E "s/^(date:[[:space:]]*)(['\"]?)[0-9]{4}-[0-9]{2}-[0-9]{2}(['\"]?)/\1\2$TODAY\3/" "$FILE"

      #- name: Translate new post to English
      #  if: ${{ steps.finalize.outputs.new_post != '' || (steps.files.outputs.new_post != '' && steps.files.outputs.has_frontmatter == 'true') }}
      #  run: |
      #    FILE="${{ steps.finalize.outputs.new_post || steps.files.outputs.new_post }}"
      #    bash scripts/translate-post.sh "$FILE"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add content/ assets/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: finalize post, assets and translations" && git push)
 
      - name: Trigger Content Sync
        if: ${{ vars.SYNC_URL }}
        run: |
          curl --fail --show-error -X POST "${{ vars.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Prepare Announcement
        id: announce
        if: ${{ (steps.finalize.outputs.new_post != '' || (steps.files.outputs.new_post != '' && steps.files.outputs.has_frontmatter == 'true')) && !contains(steps.files.outputs.exclude, 'all') }}
        run: |
          FILE="${{ steps.finalize.outputs.new_post || steps.files.outputs.new_post }}"

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No new posts in content/ru/blog/ found, skipping announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
          bash scripts/generate-announce.sh "$FILE"
          ANNOUNCE_FILE="${FILE%.*}.txt"

          TITLE=$(grep -m1 '^title:' "$FILE" | sed 's/^title:[[:space:]]*//' | tr -d "'\"" || true)
          echo "has_post=true" >> "$GITHUB_OUTPUT"
          echo "post_title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "post_url=${SITE_BASE_URL}/ru/blog/${SLUG}" >> "$GITHUB_OUTPUT"
          echo "exclude=${{ steps.files.outputs.exclude }}" >> "$GITHUB_OUTPUT"
          echo "announce_file=$ANNOUNCE_FILE" >> "$GITHUB_OUTPUT"

          IMAGE_PATH="assets/blog/${SLUG}.png"
          if [ -f "$IMAGE_PATH" ]; then
            echo "post_image=$IMAGE_PATH" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare English Announcement
        id: announce_en
        if: ${{ (steps.finalize.outputs.new_post != '' || (steps.files.outputs.new_post != '' && steps.files.outputs.has_frontmatter == 'true')) && !contains(steps.files.outputs.exclude, 'all') }}
        run: |
          FILE="${{ steps.finalize.outputs.new_post || steps.files.outputs.new_post }}"

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No new posts found, skipping English announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EN_FILE="${FILE/content\/ru\//content\/en\/}"

          if [ ! -f "$EN_FILE" ]; then
            echo "English translation not found at $EN_FILE, skipping English announcement."
            echo "has_post=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
          bash scripts/generate-announce.sh "$EN_FILE"
          ANNOUNCE_FILE="${EN_FILE%.*}.txt"

          echo "has_post=true" >> "$GITHUB_OUTPUT"
          echo "post_url=${SITE_BASE_URL}/en/blog/${SLUG}" >> "$GITHUB_OUTPUT"
          echo "announce_file=$ANNOUNCE_FILE" >> "$GITHUB_OUTPUT"

          IMAGE_PATH="assets/blog/${SLUG}.png"
          if [ -f "$IMAGE_PATH" ]; then
            echo "post_image=$IMAGE_PATH" >> "$GITHUB_OUTPUT"
          fi

      - name: Announce to Telegram
        if: ${{ steps.announce.outputs.has_post == 'true' && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'telegram') && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHANNEL_ID != '' }}
        run: |
          bash scripts/publish-telegram.sh \
            --message "${{ steps.announce.outputs.announce_file }}" \
            --image "${{ steps.announce.outputs.post_image }}" \
            --chat-id "${TELEGRAM_CHANNEL_ID}"

      - name: Announce English Post to Telegram
        if: ${{ steps.announce_en.outputs.has_post == 'true' && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'telegram') && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_ENGLISH_CHANNEL_ID != '' }}
        run: |
          bash scripts/publish-telegram.sh \
            --message "${{ steps.announce_en.outputs.announce_file }}" \
            --image "${{ steps.announce_en.outputs.post_image }}" \
            --chat-id "${TELEGRAM_ENGLISH_CHANNEL_ID}" \
            --parse-mode ""

      - name: Announce to Threads
        if: ${{ (steps.announce.outputs.has_post == 'true' || steps.announce_en.outputs.has_post == 'true') && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'threads') && env.THREADS_TOKEN != '' && env.THREADS_USER_ID != '' }}
        run: |
          if [ "${THREADS_LANG}" = "ru" ]; then
            MESSAGE=$(cat "${{ steps.announce.outputs.announce_file }}")
          else
            MESSAGE=$(cat "${{ steps.announce_en.outputs.announce_file }}")
          fi
          CREATION_ID=$(curl --fail --show-error -s \
            -X POST "https://graph.threads.net/v1.0/${THREADS_USER_ID}/threads" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{media_type: "TEXT", text: $text}')" \
            -H "Authorization: Bearer ${THREADS_TOKEN}" \
            | jq -r '.id')
          curl --fail --show-error -s \
            -X POST "https://graph.threads.net/v1.0/${THREADS_USER_ID}/threads_publish" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg id "$CREATION_ID" '{creation_id: $id}')" \
            -H "Authorization: Bearer ${THREADS_TOKEN}"

      - name: Announce English Post to X
        if: ${{ steps.announce_en.outputs.has_post == 'true' && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'x') && env.X_TOKEN != '' }}
        run: |
          MESSAGE=$(cat "${{ steps.announce_en.outputs.announce_file }}")
          curl --fail --show-error -s \
            -X POST "https://api.twitter.com/2/tweets" \
            -H "Authorization: Bearer ${X_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{text: $text}')"

      - name: Announce to Max
        if: ${{ steps.announce.outputs.has_post == 'true' && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'max') && env.MAX_BOT_TOKEN != '' && env.MAX_CHANNEL_ID != '' }}
        run: |
          MESSAGE=$(cat "${{ steps.announce.outputs.announce_file }}")
          jq -n --arg text "$MESSAGE" '{text: $text}' \
            > "$RUNNER_TEMP/max_payload.json"
          curl --fail --show-error -s -X POST "https://botapi.max.ru/messages?access_token=${MAX_BOT_TOKEN}&chat_id=${MAX_CHANNEL_ID}" \
            -H "Content-Type: application/json" \
            --data "@$RUNNER_TEMP/max_payload.json"

      - name: Announce to LinkedIn
        if: ${{ steps.announce.outputs.has_post == 'true' && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'linkedin') && env.LINKEDIN_TOKEN != '' && env.LINKEDIN_AUTHOR != '' }}
        run: |
          MESSAGE=$(cat "${{ steps.announce.outputs.announce_file }}")
          IMAGE="${{ steps.announce.outputs.post_image }}"
          TITLE="${{ steps.announce.outputs.post_title }}"
          
          ARGS=(--text "$MESSAGE")
          if [ -n "$IMAGE" ] && [ -f "$IMAGE" ]; then
            ARGS+=(--image "$IMAGE" --title "$TITLE")
          fi
          
          bash scripts/publish-linkedin.sh "${ARGS[@]}"

      - name: Announce to Medium
        if: ${{ steps.announce.outputs.has_post == 'true' && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'medium') && env.MEDIUM_TOKEN != '' && env.MEDIUM_AUTHOR_ID != '' }}
        run: |
          MESSAGE=$(cat "${{ steps.announce.outputs.announce_file }}")
          jq -n \
            --arg title "${{ steps.announce.outputs.post_title }}" \
            --arg content "$MESSAGE" \
            --arg canonical "${{ steps.announce.outputs.post_url }}" \
            '{
              title: $title,
              contentFormat: "markdown",
              content: $content,
              canonicalUrl: $canonical,
              publishStatus: "public"
            }' > "$RUNNER_TEMP/medium_payload.json"
          curl --fail --show-error -s \
            -X POST "https://api.medium.com/v1/users/${MEDIUM_AUTHOR_ID}/posts" \
            -H "Authorization: Bearer ${MEDIUM_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "@$RUNNER_TEMP/medium_payload.json"

      - name: Publish English Article to Telegraph
        if: ${{ (steps.finalize.outputs.new_post != '' || (steps.files.outputs.new_post != '' && steps.files.outputs.has_frontmatter == 'true')) && !contains(steps.files.outputs.exclude, 'all') && !contains(steps.files.outputs.exclude, 'telegraph') && env.TELEGRAPH_ACCESS_TOKEN != '' }}
        run: |
          set -e
          FILE="${{ steps.finalize.outputs.new_post || steps.files.outputs.new_post }}"
          EN_FILE="${FILE/content\/ru\//content\/en\/}"
          SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')

          if [ ! -f "$EN_FILE" ]; then
            echo "English translation not found at $EN_FILE, skipping Telegraph publication."
            exit 0
          fi

          echo "Publishing $EN_FILE to Telegraph..."
          TELEGRAPH_URL=$(python scripts/publish-telegraph.py "$EN_FILE" "$SLUG")

          if [ -n "$TELEGRAPH_URL" ]; then
            echo "Published to Telegraph: $TELEGRAPH_URL"
          fi
