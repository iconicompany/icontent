name: Trigger Sync

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
      MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
      MAX_CHANNEL_ID: ${{ vars.MAX_CHANNEL_ID }}
      LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
      LINKEDIN_AUTHOR: ${{ vars.LINKEDIN_AUTHOR }}
      MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
      MEDIUM_AUTHOR_ID: ${{ vars.MEDIUM_AUTHOR_ID }}
      THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
      THREADS_USER_ID: ${{ vars.THREADS_USER_ID }}
      THREADS_LANG: ${{ vars.THREADS_LANG || 'en' }}
      TELEGRAM_ENGLISH_CHANNEL_ID: ${{ vars.TELEGRAM_ENGLISH_CHANNEL_ID }}
      X_TOKEN: ${{ secrets.X_TOKEN }}
      X_USER_ID: ${{ vars.X_USER_ID }}
      TELEGRAM_CHANNEL_URL: ${{ vars.TELEGRAM_CHANNEL_URL }}
      MAX_CHANNEL_URL: ${{ vars.MAX_CHANNEL_URL }}
      DZEN_CHANNEL_URL: ${{ vars.DZEN_CHANNEL_URL }}
      TELEGRAPH_ACCESS_TOKEN: ${{ secrets.TELEGRAPH_ACCESS_TOKEN }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://iconicompany.com' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      SYNC_URL: ${{ vars.SYNC_URL }}
      SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
      GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Run synchronization pipeline
        run: bun scripts/sync.ts
