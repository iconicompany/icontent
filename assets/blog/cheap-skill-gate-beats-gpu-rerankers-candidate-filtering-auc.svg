<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1e293b">Кто отделяет мусор от годных кандидатов (AUC)</text>
  <text x="32" y="62" font-size="13" fill="#64748b">Выше — лучше. Пунктир 0.5 — уровень случайного угадывания.</text>

  <!-- axis reference lines: 0.5 and 1.0 -->
  <line x1="479" y1="80" x2="479" y2="316" stroke="#9aa5b1" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="479" y="334" font-size="11" fill="#94a3b8" text-anchor="middle">0.5 — случайно</text>
  <line x1="244" y1="80" x2="244" y2="316" stroke="#e2e8f0" stroke-width="1"/>

  <!-- MaxSim (winner) -->
  <text x="236" y="95" font-size="13" font-weight="700" fill="#1e293b" text-anchor="end">MaxSim по навыкам</text>
  <text x="236" y="110" font-size="11" fill="#64748b" text-anchor="end">CPU, дёшево</text>
  <rect x="244" y="80" width="352" height="34" rx="4" fill="#4d7cc7" stroke="#3a63a5"/>
  <text x="606" y="102" font-size="14" font-weight="700" fill="#1e293b">0.75</text>

  <!-- bge-m3 -->
  <text x="236" y="147" font-size="13" fill="#334155" text-anchor="end">bge-reranker-v2-m3</text>
  <text x="236" y="162" font-size="11" fill="#64748b" text-anchor="end">текст, GPU</text>
  <rect x="244" y="132" width="282" height="34" rx="4" fill="#e2e8f0" stroke="#c3ccd8"/>
  <text x="536" y="154" font-size="14" font-weight="600" fill="#475569">0.60</text>

  <!-- matchedBatch -->
  <text x="236" y="199" font-size="13" fill="#334155" text-anchor="end">matchedBatch (реранкер)</text>
  <text x="236" y="214" font-size="11" fill="#64748b" text-anchor="end">текущий, CPU</text>
  <rect x="244" y="184" width="282" height="34" rx="4" fill="#e2e8f0" stroke="#c3ccd8"/>
  <text x="536" y="206" font-size="14" font-weight="600" fill="#475569">0.60</text>

  <!-- mmarco -->
  <text x="236" y="251" font-size="13" fill="#334155" text-anchor="end">mmarco-mMiniLMv2</text>
  <text x="236" y="266" font-size="11" fill="#64748b" text-anchor="end">текст, GPU</text>
  <rect x="244" y="236" width="263" height="34" rx="4" fill="#e2e8f0" stroke="#c3ccd8"/>
  <text x="517" y="258" font-size="14" font-weight="600" fill="#475569">0.56</text>

  <!-- cosine -->
  <text x="236" y="303" font-size="13" fill="#334155" text-anchor="end">косинус (1-я стадия)</text>
  <text x="236" y="318" font-size="11" fill="#64748b" text-anchor="end">текущий, CPU</text>
  <rect x="244" y="288" width="263" height="34" rx="4" fill="#e2e8f0" stroke="#c3ccd8"/>
  <text x="517" y="310" font-size="14" font-weight="600" fill="#475569">0.56</text>
</svg>
